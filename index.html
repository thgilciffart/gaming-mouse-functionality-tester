<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mouse Test</title>
    <style>
        body {
            background-color: #000;
            color: #fff;
            font-family: 'Fira Code', monospace;
            margin: 10px;
        }

        .container {
            display: flex;
            align-items: flex-start;
            gap: 10px;
        }

        .rates-column {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .rates-row {
            display: flex;
            gap: 10px;
        }

        table {
            border-collapse: collapse;
            font-size: 12px;
        }

        th, td {
            border: 1px solid #fff;
            padding: 4px 8px;
            text-align: center;
            min-width: 45px;
        }

        .start-test-row {
            cursor: pointer;
        }

        .start-test-row:hover {
            background-color: #333;
        }
    </style>
</head>
<body>

    <div class="container">
        <!-- Clicks Table -->
        <table>
            <thead>
                <tr>
                    <th colspan="6">Clicks</th>
                </tr>
                <tr>
                    <th></th>
                    <th>LMB</th>
                    <th>RMB</th>
                    <th>MMB</th>
                    <th>MB4</th>
                    <th>MB5</th>
                </tr>
            </thead>
            <tbody>
                <tr>
                    <th>Mouse Down</th>
                    <td>0</td>
                    <td>0</td>
                    <td>0</td>
                    <td>0</td>
                    <td>0</td>
                </tr>
                <tr>
                    <th>Mouse Up</th>
                    <td>0</td>
                    <td>0</td>
                    <td>0</td>
                    <td>0</td>
                    <td>0</td>
                </tr>
                <tr>
                    <th>Double Click</th>
                    <td>0</td>
                    <td>0</td>
                    <td>0</td>
                    <td>0</td>
                    <td>0</td>
                </tr>
            </tbody>
        </table>

        <!-- Scroll Table -->
        <table>
            <thead>
                <tr>
                    <th colspan="4">Scroll</th>
                </tr>
                <tr>
                    <th>Up</th>
                    <th>Down</th>
                    <th>Left</th>
                    <th>Right</th>
                </tr>
            </thead>
            <tbody>
                <tr>
                    <td>0</td>
                    <td>0</td>
                    <td>0</td>
                    <td>0</td>
                </tr>
            </tbody>
        </table>

        <!-- Polling & CPS Column -->
        <div class="rates-column">
            <div class="rates-row">
                <table>
                    <thead>
                        <tr>
                            <th>Polling rate</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr>
                            <td>0 Hz</td>
                        </tr>
                        <tr class="start-test-row">
                            <td>Start Test</td>
                        </tr>
                    </tbody>
                </table>

                <table>
                    <thead>
                        <tr>
                            <th>Clicks per second</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr>
                            <td>0 CPS</td>
                        </tr>
                        <tr class="start-test-row">
                            <td>Start Test</td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>

</body>
</html>
