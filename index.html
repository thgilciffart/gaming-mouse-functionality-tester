<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mouse Test</title>
    <style>
        body {
            background-color: #000;
            color: #fff;
            font-family: 'Fira Code', monospace;
            margin: 10px;
            user-select: none;
        }

        .container {
            display: flex;
            align-items: flex-start;
            gap: 10px;
        }

        .rates-column {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .rates-row {
            display: flex;
            gap: 10px;
        }

        table {
            border-collapse: collapse;
            font-size: 12px;
        }

        th, td {
            border: 1px solid #fff;
            padding: 4px 8px;
            text-align: center;
            min-width: 45px;
        }

        .start-test-row {
            cursor: pointer;
        }

        .start-test-row:hover {
            background-color: #333;
        }
    </style>
</head>
<body oncontextmenu="return false;">

    <div class="controls" style="margin-bottom: 15px;">
        <div style="margin-bottom: 5px; font-size: 12px;">
            <label for="delta-t">ΔT (ms):</label>
            <input type="number" id="delta-t" value="10" style="background: #000; color: #fff; border: 1px solid #fff; font-family: 'Fira Code', monospace; font-size: 12px; width: 60px; padding: 2px 4px;">
        </div>
        <div style="font-size: 10px; color: #888;">
            * ΔT: Maximum time (milliseconds) between two clicks to register as a double-click.
        </div>
    </div>

    <div class="container">
        <!-- Clicks Table -->
        <table>
            <thead>
                <tr>
                    <th colspan="6">Clicks</th>
                </tr>
                <tr>
                    <th></th>
                    <th>LMB</th>
                    <th>RMB</th>
                    <th>MMB</th>
                    <th>MB4</th>
                    <th>MB5</th>
                </tr>
            </thead>
            <tbody>
                <tr>
                    <th>Mouse Down</th>
                    <td id="lmb-down">0</td>
                    <td id="rmb-down">0</td>
                    <td id="mmb-down">0</td>
                    <td id="mb4-down">0</td>
                    <td id="mb5-down">0</td>
                </tr>
                <tr>
                    <th>Mouse Up</th>
                    <td id="lmb-up">0</td>
                    <td id="rmb-up">0</td>
                    <td id="mmb-up">0</td>
                    <td id="mb4-up">0</td>
                    <td id="mb5-up">0</td>
                </tr>
                <tr>
                    <th>Double Click</th>
                    <td id="lmb-double">0</td>
                    <td id="rmb-double">0</td>
                    <td id="mmb-double">0</td>
                    <td id="mb4-double">0</td>
                    <td id="mb5-double">0</td>
                </tr>
            </tbody>
        </table>

        <!-- Scroll Table -->
        <table>
            <thead>
                <tr>
                    <th colspan="4">Scroll</th>
                </tr>
                <tr>
                    <th>Up</th>
                    <th>Down</th>
                    <th>Left</th>
                    <th>Right</th>
                </tr>
            </thead>
            <tbody>
                <tr>
                    <td id="scroll-up">0</td>
                    <td id="scroll-down">0</td>
                    <td id="scroll-left">0</td>
                    <td id="scroll-right">0</td>
                </tr>
            </tbody>
        </table>

        <!-- Polling & CPS Column -->
        <div class="rates-column">
            <div class="rates-row">
                <table>
                    <thead>
                        <tr>
                            <th>Polling rate</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr>
                            <td>0 Hz</td>
                        </tr>
                        <tr class="start-test-row">
                            <td>Start Test</td>
                        </tr>
                    </tbody>
                </table>

                <table>
                    <thead>
                        <tr>
                            <th>Clicks per second</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr>
                            <td>0 CPS</td>
                        </tr>
                        <tr class="start-test-row">
                            <td>Start Test</td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <script>
        // Click and Double Click Logic
        const stats = {
            down: { 0: 0, 1: 0, 2: 0, 3: 0, 4: 0 },
            up: { 0: 0, 1: 0, 2: 0, 3: 0, 4: 0 },
            double: { 0: 0, 1: 0, 2: 0, 3: 0, 4: 0 }
        };

        const lastClickTime = { 0: 0, 1: 0, 2: 0, 3: 0, 4: 0 };

        const buttonMap = {
            0: 'lmb',
            1: 'mmb',
            2: 'rmb',
            3: 'mb4',
            4: 'mb5'
        };

        const tInput = document.getElementById('delta-t');

        function updateDisplay(btn, type) {
            const key = buttonMap[btn];
            if (key) {
                const element = document.getElementById(`${key}-${type}`);
                if (element) {
                    element.textContent = stats[type][btn];
                }
            }
        }

        window.addEventListener('mousedown', (e) => {
            if (stats.down.hasOwnProperty(e.button)) {
                const now = performance.now();
                const threshold = parseInt(tInput.value) || 10;
                
                if (now - lastClickTime[e.button] < threshold) {
                    stats.double[e.button]++;
                    updateDisplay(e.button, 'double');
                }
                
                lastClickTime[e.button] = now;
                stats.down[e.button]++;
                updateDisplay(e.button, 'down');
            }
        });

        window.addEventListener('mouseup', (e) => {
            if (stats.up.hasOwnProperty(e.button)) {
                stats.up[e.button]++;
                updateDisplay(e.button, 'up');
            }
        });

        // Scroll Logic
        const scrollStats = {
            up: 0,
            down: 0,
            left: 0,
            right: 0
        };

        window.addEventListener('wheel', (e) => {
            if (e.deltaY < 0) {
                scrollStats.up++;
                document.getElementById('scroll-up').textContent = scrollStats.up;
            } else if (e.deltaY > 0) {
                scrollStats.down++;
                document.getElementById('scroll-down').textContent = scrollStats.down;
            }

            if (e.deltaX < 0) {
                scrollStats.left++;
                document.getElementById('scroll-left').textContent = scrollStats.left;
            } else if (e.deltaX > 0) {
                scrollStats.right++;
                document.getElementById('scroll-right').textContent = scrollStats.right;
            }
        }, { passive: true });
    </script>

</body>
</html>
